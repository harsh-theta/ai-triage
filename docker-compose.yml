
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "9001:9001"
    environment:
      - TTS_SERVICE_URL=http://106.201.228.100:9003
      - ROOT_PATH=/intelligent-triage
      - PROXY_DOMAIN=https://demo.thetatechnolabs.com
    volumes:
      - ./backend/responses:/app/responses
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8010:80"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://106.201.228.100:9001
      - NEXT_PUBLIC_API_BASE_PATH=/intelligent-triage
    depends_on:
      - backend 