version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "9001:9001"
    volumes:
      - ./backend/responses:/app/responses
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:9001
    depends_on:
      - backend 