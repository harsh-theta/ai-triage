worker_processes 1;
events { 
    worker_connections 1024; 
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    
    # Add resolver for Docker DNS
    resolver 127.0.0.11 valid=30s;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80;
        server_name demo.thetatechnolabs.com _;
        
        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html;
        
        # Health check endpoint
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Handle Next.js static assets (_next directory)
        location /_next/ {
            alias /usr/share/nginx/html/_next/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            
            # Handle missing files gracefully
            try_files $uri =404;
        }
        
        # Handle static assets like images, CSS, JS files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            
            # Handle missing files gracefully
            try_files $uri =404;
        }
        
        # Serve the main application at root
        location = / {
            try_files /index.html =404;
        }
        
        # Handle SPA routing - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;
    }
}
