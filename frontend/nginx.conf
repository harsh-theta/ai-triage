worker_processes 1;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    
    # Add resolver for Docker DNS
    resolver 127.0.0.11 valid=30s;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80;
        server_name demo.thetatechnolabs.com _;
        
        # Health check endpoint
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Redirect /intelligent-triage/backend to /intelligent-triage
        location = /intelligent-triage/backend {
            return 301 /intelligent-triage;
        }

        # Redirect /intelligent-triage/frontend to /intelligent-triage
        location = /intelligent-triage/frontend {
            return 301 /intelligent-triage;
        }

        # Proxy API requests to backend
        location ~ ^/intelligent-triage/(chat|triage|tts|docs|openapi) {
            proxy_pass http://backend:9001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /intelligent-triage;
            
            # CORS headers for API requests
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            
            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }
        }

        # Serve the main application at /intelligent-triage
        location = /intelligent-triage {
            alias /usr/share/nginx/html/;
            try_files index.html =404;
        }

        # Serve Next.js static assets (_next directory)
        location /intelligent-triage/_next/ {
            alias /usr/share/nginx/html/_next/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Serve other static files for the frontend at /intelligent-triage/
        location /intelligent-triage/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /intelligent-triage/index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Serve the app at root URLs
        location = / {
            alias /usr/share/nginx/html/;
            try_files index.html =404;
        }

        # Handle 404 for unknown routes
        location / {
            return 404;
        }
    }
} 