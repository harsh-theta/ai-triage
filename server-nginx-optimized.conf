# Optimized nginx configuration for intelligent-triage
# Place this in /etc/nginx/sites-available/intelligent-triage
# Then enable it: sudo ln -s /etc/nginx/sites-available/intelligent-triage /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name demo.thetatechnolabs.com;

    # Logging
    access_log /var/log/nginx/intelligent_triage_access.log;
    error_log /var/log/nginx/intelligent_triage_error.log;

    # Redirect /intelligent-triage to /intelligent-triage/
    location = /intelligent-triage {
        return 301 /intelligent-triage/;
    }

    # Redirect /intelligent-triage/backend to /intelligent-triage/
    location = /intelligent-triage/backend {
        return 301 /intelligent-triage/;
    }

    # Redirect /intelligent-triage/frontend to /intelligent-triage/
    location = /intelligent-triage/frontend {
        return 301 /intelligent-triage/;
    }

    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Proxy TTS service static files
    location /intelligent-triage/static/ {
        proxy_pass http://106.201.228.100:9003/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers for audio files
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
        
        # Cache audio files
        expires 1h;
        add_header Cache-Control "public";
    }

    # Backend API - FastAPI application
    location ~ ^/intelligent-triage/(chat|triage|tts|docs|openapi|redoc|favicon\.ico) {
        proxy_pass http://localhost:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /intelligent-triage;
        
        # Handle CORS
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }

    # Frontend static assets - Next.js _next directory
    location /intelligent-triage/_next/ {
        proxy_pass http://localhost:8010/_next/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle static assets like images, CSS, JS files
    location ~* /intelligent-triage/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend - Next.js application (all other /intelligent-triage/ requests)
    location /intelligent-triage/ {
        proxy_pass http://localhost:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /intelligent-triage;
        
        # Handle Next.js routing
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout settings
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Redirect root to intelligent-triage
    location = / {
        return 301 /intelligent-triage/;
    }

    # All other requests go to the existing application
    location / {
        # This should point to your existing application
        # You may need to adjust this based on your current setup
        proxy_pass http://localhost:3000;  # Adjust this port as needed
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
